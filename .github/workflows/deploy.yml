name: Deploy to edu01

on:
  push:
    branches:
      - main

# Runs on a self-hosted GitHub Actions runner installed on edu01.
# No inbound SSH is required — the runner pulls jobs from GitHub over an
# outbound connection and executes the deploy locally on the server.
jobs:
  deploy:
    runs-on: [self-hosted, edu01]

    steps:
      - name: Pull latest code and redeploy
        run: |
          set -e
          cd "$HOME/Mude_monitoring"

          git fetch --all --prune
          git reset --hard origin/main

          docker compose up -d --build
          docker image prune -f

          echo "Deploy complete"
