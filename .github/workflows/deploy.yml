name: CI & Deploy to edu01

# Build/typecheck on every push & PR. Deploy only on push to main
# (or a manual run from the Actions tab).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. Build & typecheck both apps on the runner ───────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Backend — install & build
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Frontend — install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ── 2. Deploy on edu01 via a self-hosted runner ────────────────────
  # Runs only on pushes to main (not PRs) and manual dispatches.
  #
  # GitHub-hosted runners cannot reach edu01 (the student-linux gateway
  # filters by source IP and times out cloud/foreign IPs). Instead, a
  # self-hosted runner registered ON edu01 polls GitHub over an OUTBOUND
  # connection and runs the deploy locally — no inbound SSH, no jump host,
  # no secrets needed. See README → "CI/CD pipeline" for runner setup.
  #
  # The runner is registered with the custom label `edu01` and runs as the
  # deploy user, so it has docker-group access and owns ~/Mude_monitoring
  # (which holds the untracked .env). deploy.sh itself git-pulls origin/main.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: [self-hosted, edu01]
    steps:
      - name: Deploy on edu01
        run: |
          set -e
          cd ~/Mude_monitoring
          ./deploy.sh
