services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - db_data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/monitoring.db
      # SMTP email alerts (replaces AWS SNS)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      # Public base URL of the dashboard (used in alert links)
      - PUBLIC_URL=${PUBLIC_URL}
      - API_KEY=${API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL}

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
