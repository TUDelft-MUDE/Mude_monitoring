services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - db_data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/monitoring.db
      - PUBLIC_URL=${PUBLIC_URL}
      - API_KEY=${API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      # Email alerts (TU Delft SMTP relay)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
      # Teams alerts (optional — leave unset to disable)
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL}

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      # Loopback for local debugging on the host
      - "127.0.0.1:3000:3000"
      # Docker bridge gateway so the host's didata-nginx reverse proxy
      # (which fronts ports 80/443) can reach this SPA via http://172.17.0.1:3000
      - "172.17.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
