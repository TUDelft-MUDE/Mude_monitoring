# MUDE monitoring — host nginx vhost for edu01
#
# TLS uses an ICT-issued institutional certificate (NOT Let's Encrypt/certbot),
# same as the existing edu01.citg.tudelft.nl site. After ICT delivers the cert,
# place the files on the host and make the two ssl_* paths below match them.
#
#   ssl_certificate     → full chain .pem  (e.g. /etc/ssl/certs/mude_monitoring_citg_tudelft_nl.pem)
#   ssl_certificate_key → private key      (e.g. /etc/ssl/private/mude-monitoring.citg.tudelft.nl.key)
#
# Then: sudo nginx -t && sudo systemctl reload nginx

# HTTP :80 — redirect everything to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mude-monitoring.citg.tudelft.nl;

    return 301 https://$host$request_uri;
}

# HTTPS :443 — terminate TLS, proxy to the Docker frontend on 127.0.0.1:3000
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mude-monitoring.citg.tudelft.nl;

    # ── ICT-issued certificate (update paths to match delivered files) ──
    ssl_certificate     /etc/ssl/certs/mude_monitoring_citg_tudelft_nl.pem;
    ssl_certificate_key /etc/ssl/private/mude-monitoring.citg.tudelft.nl.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
