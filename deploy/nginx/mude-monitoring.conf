# ─────────────────────────────────────────────────────────────────────────
# Reference copy of the LIVE reverse-proxy block for mude-monitoring.citg.tudelft.nl
#
# IMPORTANT: this file is documentation only — nothing deploys it automatically.
# On edu01 the public reverse proxy is the Docker container `didata-nginx-1`,
# which owns ports 80/443. Two host files are involved:
#
#   1. Routing/TLS config (this block):
#        /var/web_server/website_docker_configuration/default.conf
#        (mounted into the container at /etc/nginx/conf.d/default.conf)
#
#   2. The cert/key bind mounts — added to the nginx service of the compose
#      that actually created the container (found via its
#      com.docker.compose.project.config_files label):
#        /var/web_server/htdocs/didata/docker-compose.yml
#
#      nginx service volumes (single-file, :ro — same pattern as the edu01 cert):
#        - /etc/ssl/certs/mude-monitoring.citg.tudelft.nl.crt:/etc/ssl/certs/mude-monitoring.citg.tudelft.nl.crt:ro
#        - /etc/ssl/private/mude-monitoring.citg.tudelft.nl.key:/etc/ssl/private/mude-monitoring.citg.tudelft.nl.key:ro
#
# Apply changes:
#   - cert mount added/changed → recreate nginx:
#       cd /var/web_server/htdocs/didata && sudo docker compose up -d nginx
#   - this default.conf block only changed → reload (validated, zero-downtime):
#       sudo docker exec didata-nginx-1 nginx -t
#       sudo docker exec didata-nginx-1 nginx -s reload
#
# TLS cert is issued and auto-renewed by TU Delft ICT (renewal hook runs
# `docker restart didata-nginx-1`). The proxy target 172.17.0.1:3000 is the
# Docker bridge gateway — our frontend is published there (see docker-compose.yml).
# ─────────────────────────────────────────────────────────────────────────

# HTTP :80 — redirect everything to HTTPS
server {
    listen 80;
    server_name mude-monitoring.citg.tudelft.nl;
    return 301 https://$host$request_uri;
}

# HTTPS :443 — terminate TLS, proxy to the Docker frontend on the host
server {
    listen 443 ssl;
    server_name mude-monitoring.citg.tudelft.nl;

    ssl_certificate     /etc/ssl/certs/mude-monitoring.citg.tudelft.nl.crt;
    ssl_certificate_key /etc/ssl/private/mude-monitoring.citg.tudelft.nl.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://172.17.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
