# ─────────────────────────────────────────────────────────────────────────
# Reference copy of the reverse-proxy block for mude-monitoring.citg.tudelft.nl
#
# IMPORTANT: this file is documentation only — nothing deploys it automatically.
# On edu01 the public reverse proxy is NOT the host nginx. Ports 80/443 are
# owned by a Docker container, `didata-nginx-1`, whose config is the host file:
#
#     /var/web_server/website_docker_configuration/default.conf
#         (mounted into the container at /etc/nginx/conf.d/default.conf)
#
# To route our domain, the block below is added to THAT file, then:
#
#     sudo docker exec didata-nginx-1 nginx -t
#     sudo docker exec didata-nginx-1 nginx -s reload
#
# The proxy target is the Docker bridge gateway (172.17.0.1), because from
# inside the didata-nginx container that address reaches the host, where our
# frontend container publishes port 3000 (see docker-compose.yml — the
# frontend is bound to both 127.0.0.1:3000 and 172.17.0.1:3000).
# ─────────────────────────────────────────────────────────────────────────

# ── Currently LIVE: HTTP only ────────────────────────────────────────────
# TLS is pending — the cert mounted in didata-nginx is for edu01.citg.tudelft.nl
# and does not cover this name. Request a cert for mude-monitoring.citg.tudelft.nl
# from TU Delft ICT, then switch to the HTTPS block below.
server {
    listen 80;
    server_name mude-monitoring.citg.tudelft.nl;

    location / {
        proxy_pass http://172.17.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

